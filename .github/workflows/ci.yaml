name: Run CI Tests
on:
  push:
jobs:
  CI:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: hashicorp/setup-golang@v3
        with:
          version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -v -race ./...
